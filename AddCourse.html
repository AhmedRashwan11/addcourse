<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Course</title>
    <link rel="stylesheet" href="AddCourse.css">
</head>

<body>

    <nav>
        <div class="container">
            <div class="left">
                <a href="index.html" class="logo">
                    <div class="logo-icon">📚</div>
                    <span class="logo-text">Course<span>Hub</span></span>
                </a>
            </div>
            <div class="right">
                <a href="index.html">Home</a>
                <a href="AddCourse.html">Add Course</a>
                <a href="MyCourses.html">My Course</a>
                <a href="ContactUs.html">Contact Us</a>
            </div>

            <div class="hamburger">
                ☰
            </div>
    </nav>

    <main>
        <h1 class="form-title">Add a New Course</h1>
        <form class="course-form">
            <div class="form-group">
                <label for="course-code">Course Code</label>
                <input type="text" id="course-code" name="course-code" placeholder="e.g., CS301" required>
            </div>
            <div class="form-group">
                <label for="course-name">Course Name</label>
                <input type="text" id="course-name" name="course-name" placeholder="e.g., Data Structures & Algorithms"
                    required>
            </div>
            <div class="form-group">
                <label for="instructor">Instructor</label>
                <input type="text" id="instructor" name="instructor" placeholder="e.g., Dr. Ahmed Hassan" required>
            </div>
            <div class="form-group">
                <label for="credits">Credits</label>
                <input type="number" id="credits" name="credits" placeholder="e.g., 3" min="1" max="5" required>
            </div>
            <div class="form-group">
                <label for="type">Type</label>
                <select id="type" name="type" required>
                    <option value="">Select Type</option>
                    <option value="core">Core</option>
                    <option value="elective">Elective</option>
                    <option value="lab">Lab</option>
                </select>
            </div>
            <button type="submit" class="btn btn-navy">Add Course</button>
        </form>

    </main>

    <footer>
        <p>© 2026 <strong>CourseHub</strong> · Personal Course Organizer · Built with HTML &amp; CSS</p>
    </footer>
</body>

</html>
